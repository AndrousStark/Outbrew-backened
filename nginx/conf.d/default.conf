# =============================================================================
# Outbrew API — Nginx Server Block
# =============================================================================
# Replace YOUR_DOMAIN with your actual domain (e.g., api.outbrew.metaminds.store)
# After obtaining SSL certs, uncomment the HTTPS block and the HTTP redirect.
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP Server (Port 80)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- BEFORE SSL: serve API directly on port 80 ---
    # --- AFTER SSL: uncomment the redirect below and remove the locations ---
    # return 301 https://$server_name$request_uri;

    # Health check (accessible without SSL during setup)
    location /health {
        proxy_pass http://outbrew_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API endpoints
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_conn addr 50;

        proxy_pass http://outbrew_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;
    }

    # Auth endpoints — stricter rate limiting
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=3 nodelay;
        limit_conn addr 10;

        proxy_pass http://outbrew_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Root → API docs
    location = / {
        proxy_pass http://outbrew_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}


# =============================================================================
# Outbrew API — Nginx Server Block for VPS
# =============================================================================
# Copy to: /etc/nginx/sites-enabled/outbrew-api.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# After DNS is set, get SSL:
#   sudo certbot --nginx -d api.outbrew.metaminds.store
# =============================================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=outbrew_api:5m rate=30r/s;
limit_req_zone $binary_remote_addr zone=outbrew_auth:5m rate=5r/m;

upstream outbrew_backend {
    server 127.0.0.1:8001;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.outbrew.metaminds.store;

    # Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Health check (works without SSL)
    location /health {
        proxy_pass http://outbrew_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API
    location /api/ {
        limit_req zone=outbrew_api burst=20 nodelay;

        proxy_pass http://outbrew_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 4 8k;

        # CORS headers
        add_header Access-Control-Allow-Origin "https://metaminds.store" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age "3600" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Auth — stricter rate limit
    location /api/v1/auth/ {
        limit_req zone=outbrew_auth burst=3 nodelay;

        proxy_pass http://outbrew_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Swagger docs
    location /api/docs {
        proxy_pass http://outbrew_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/redoc {
        proxy_pass http://outbrew_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/openapi.json {
        proxy_pass http://outbrew_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Root
    location = / {
        proxy_pass http://outbrew_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Security
    location ~ /\. { deny all; return 404; }

    client_max_body_size 25M;
}

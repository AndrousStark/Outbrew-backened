version: "3.9"

# =============================================================================
# Outbrew Backend — VPS-Optimized Docker Compose (Neon PostgreSQL)
# =============================================================================
# API-only container. Database hosted on Neon (serverless PostgreSQL).
# Redis uses existing Valkey on the VPS.
#
# Prerequisites:
#   - Neon database created (DATABASE_URL in .env)
#   - Valkey/Redis running on 127.0.0.1:6379 (unjynx-valkey)
#   - Nginx running on 80/443 (existing)
#
# Usage:
#   docker compose -f docker-compose.vps.yml up -d
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.vps
    container_name: outbrew-api
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      REDIS_URL: redis://@host.docker.internal:6379/2
      REDIS_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./storage:/app/storage
      - ./exports:/app/exports
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.75"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

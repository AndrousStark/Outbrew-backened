version: "3.9"

# =============================================================================
# Outbrew Backend — Production Docker Compose
# =============================================================================
# Usage:
#   cp .env.production.example .env
#   # Edit .env with your actual values
#   docker compose -f docker-compose.prod.yml up -d
#
# Services:
#   - api:      FastAPI application (Gunicorn + Uvicorn workers)
#   - postgres: PostgreSQL 16 database
#   - redis:    Redis 7 for caching + rate limiting
#   - nginx:    Reverse proxy with SSL termination
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: outbrew-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - outbrew-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: outbrew-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-outbrew-redis-secret}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - outbrew-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # FastAPI Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: production
    container_name: outbrew-api
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-outbrew-redis-secret}@redis:6379/0
      REDIS_ENABLED: "true"
      RUN_MIGRATIONS: "true"
      WORKERS: ${API_WORKERS:-4}
      TIMEOUT: "120"
      LOG_LEVEL: "info"
    volumes:
      - api_storage:/app/storage
      - api_exports:/app/exports
      - api_logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - outbrew-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (SSL Termination)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: outbrew-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - outbrew-network

  # ---------------------------------------------------------------------------
  # Certbot (SSL Certificate Management)
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: outbrew-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renew certificates. Run manually first, then cron handles renewal.
    # Initial: docker compose -f docker-compose.prod.yml run certbot certonly --webroot -w /var/www/certbot -d api.outbrew.metaminds.store --agree-tos --email your@email.com
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h; done'"
    networks:
      - outbrew-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_storage:
    driver: local
  api_exports:
    driver: local
  api_logs:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
  nginx_logs:
    driver: local

networks:
  outbrew-network:
    driver: bridge

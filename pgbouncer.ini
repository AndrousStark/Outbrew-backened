; ============================================================================
; PgBouncer Configuration for Phase 3 Connection Pooling
; ============================================================================
;
; PgBouncer is a lightweight connection pooler for PostgreSQL that:
; - Reduces connection overhead
; - Handles connection pooling efficiently
; - Supports transaction and session pooling
; - Scales to thousands of clients
;
; INSTALLATION:
;   Ubuntu: sudo apt-get install pgbouncer
;   Mac: brew install pgbouncer
;   Windows: Download from https://www.pgbouncer.org/
;
; START PGBOUNCER:
;   pgbouncer -d pgbouncer.ini
;
; MONITORING:
;   psql -p 6432 -U postgres pgbouncer
;   SHOW POOLS;
;   SHOW STATS;
;
; ============================================================================

[databases]
; Database connections
; Format: dbname = host=hostname port=port dbname=database
outbrew = host=localhost port=5432 dbname=outbrew

; You can add multiple databases
; outbrew_test = host=localhost port=5432 dbname=outbrew_test

[pgbouncer]
; ============================================================================
; BASIC SETTINGS
; ============================================================================

; Listen on this address
listen_addr = 127.0.0.1

; Listen on this port (default PostgreSQL is 5432)
listen_port = 6432

; Authentication type
; - trust: No password required (development only!)
; - md5: MD5 password authentication (recommended)
; - scram-sha-256: Modern secure authentication
auth_type = md5

; Authentication file (create with: echo '"username" "password"' > userlist.txt)
auth_file = /etc/pgbouncer/userlist.txt
; Or for development:
; auth_file = userlist.txt

; ============================================================================
; POOLING SETTINGS
; ============================================================================

; Pool mode
; - session: Client stays connected to same server (default)
; - transaction: Server returned to pool after each transaction (recommended for web apps)
; - statement: Server returned after each statement (rarely used)
pool_mode = transaction

; Maximum number of client connections allowed
max_client_conn = 1000

; Default pool size (number of server connections per database/user pair)
default_pool_size = 25

; Minimum pool size (keep this many connections open)
min_pool_size = 10

; Reserve pool size (additional connections for heavy load)
reserve_pool_size = 5

; Maximum database connections per user
max_db_connections = 50

; Maximum connections per user
max_user_connections = 50

; ============================================================================
; CONNECTION LIMITS & TIMEOUTS
; ============================================================================

; Close server connection if it has been idle for this long (seconds)
server_idle_timeout = 600

; If client has not sent a query in this time, close connection (seconds)
; 0 = disabled
client_idle_timeout = 0

; If connection and login don't finish in this time, close connection (seconds)
server_connect_timeout = 15

; If login does not finish in this time, close connection (seconds)
server_login_retry = 15

; Queries running longer than this are canceled (seconds)
; 0 = disabled
query_timeout = 0

; Wait time when servers are full (seconds)
query_wait_timeout = 120

; ============================================================================
; LOGGING
; ============================================================================

; Log file location
logfile = /var/log/pgbouncer/pgbouncer.log
; Or for development:
; logfile = pgbouncer.log

; Pid file
pidfile = /var/run/pgbouncer/pgbouncer.pid
; Or for development:
; pidfile = pgbouncer.pid

; Log level (debug, info, warning, error)
log_level = info

; Log connections
log_connections = 1

; Log disconnections
log_disconnections = 1

; Log pooler errors
log_pooler_errors = 1

; ============================================================================
; ADMIN INTERFACE
; ============================================================================

; Admin users (comma-separated)
admin_users = postgres

; Stats users (can view stats but not change config)
stats_users = stats, postgres

; ============================================================================
; ADVANCED SETTINGS
; ============================================================================

; Server reset query (executed when server connection is returned to pool)
; Important for cleaning up temporary tables, prepared statements, etc.
server_reset_query = DISCARD ALL

; Server check query (test if connection is alive)
server_check_query = SELECT 1

; Server check delay (seconds between checks)
server_check_delay = 30

; Server lifetime (close server connection after this many seconds)
; Helps with server-side connection leaks
server_lifetime = 3600

; Server round robin (distribute connections evenly)
server_round_robin = 1

; Ignore startup parameters (don't pass these to PostgreSQL)
; ignore_startup_parameters = extra_float_digits

; ============================================================================
; PERFORMANCE TUNING
; ============================================================================

; SO_REUSEPORT support (Linux 3.9+)
; Allows multiple PgBouncer processes on same port
; so_reuseport = 1

; Max packet size
pkt_buf = 4096

; Listen backlog
listen_backlog = 128

; Buffer for each connection
sbuf_loopcnt = 5

; ============================================================================
; SECURITY
; ============================================================================

; Disable preamble (faster, but less secure)
; disable_preamble = 0

; Application name to send to PostgreSQL
application_name_add_host = 1

; ============================================================================
; DNS
; ============================================================================

; How often to check DNS for changes (seconds)
; dns_max_ttl = 15

; Zone to use for DNS lookups
; dns_zone_check_period = 0

; ============================================================================
; NOTES FOR PHASE 3
; ============================================================================

/*
CONFIGURATION CHECKLIST:

1. CREATE AUTHENTICATION FILE (userlist.txt):
   echo '"postgres" "your_password"' > userlist.txt

2. UPDATE APPLICATION DATABASE URL:
   Before: postgresql://user:pass@localhost:5432/outbrew
   After:  postgresql://user:pass@localhost:6432/outbrew  (note port 6432)

3. START PGBOUNCER:
   pgbouncer -d pgbouncer.ini

4. VERIFY CONNECTION:
   psql -h localhost -p 6432 -U postgres outbrew

5. MONITOR PERFORMANCE:
   psql -p 6432 -U postgres pgbouncer
   SHOW POOLS;
   SHOW CLIENTS;
   SHOW SERVERS;
   SHOW STATS;

BENEFITS:

1. Connection Pooling:
   - Reuses database connections
   - Reduces connection overhead
   - Faster query execution

2. Scalability:
   - Handles 1000+ client connections
   - Only 25-50 actual database connections
   - Better resource utilization

3. Transaction Pooling:
   - Server returned after each transaction
   - Maximum connection reuse
   - Perfect for web applications

4. Monitoring:
   - Real-time statistics
   - Connection tracking
   - Performance metrics

PERFORMANCE IMPACT:

Without PgBouncer:
- New connection: ~5-10ms overhead
- Max connections: Limited by PostgreSQL (100-200)
- Connection exhaustion possible

With PgBouncer:
- Connection from pool: ~0.1ms overhead
- Max connections: 1000+ clients
- Database only sees 25-50 connections
- 50-100x improvement in connection handling

TROUBLESHOOTING:

1. Can't connect to PgBouncer:
   - Check listen_addr and listen_port
   - Verify pgbouncer is running: ps aux | grep pgbouncer
   - Check logs: tail -f pgbouncer.log

2. Authentication fails:
   - Check auth_type matches PostgreSQL
   - Verify userlist.txt has correct credentials
   - Check auth_file path

3. Pool exhausted:
   - Increase default_pool_size
   - Check for connection leaks in application
   - Monitor with SHOW POOLS;

4. Slow queries:
   - Check query_timeout setting
   - Monitor with SHOW STATS;
   - Verify server_check_delay is reasonable
*/
